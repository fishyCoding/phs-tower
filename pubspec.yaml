name: ph_tower
description: "The Tower — Princeton High School's student newspaper."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  flutter_markdown_plus: ^1.0.7
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.0
  share_plus: ^10.1.0
  shared_preferences: ^2.3.0
  onesignal_flutter: ^5.3.0
  pdfx: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1
  image: ^4.2.0

flutter:
  uses-material-design: true
  
  config:
    enable-swift-package-manager: false
  assets:
    - lib/home_layout.txt
    - assets/Logo.PNG
    - assets/wood.jpg
  fonts:
    - family: Canterbury
      fonts:
        - asset: assets/fonts/Canterbury.ttf

# Native launch screen (shown before Flutter starts). White + the Tower logo,
# replacing the default Flutter logo. Regenerate with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#ffffff"
  image: assets/Logo.PNG
  android_12:
    color: "#ffffff"
    # Android 12 masks the splash icon to a circle — use the padded version so
    # the logo isn't clipped. Regenerate assets/logo_icon.png via tool/make_icon.dart.
    image: assets/logo_icon.png

# Home-screen launcher icon = the Tower logo (padded to fit the adaptive/circle
# mask). Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo_icon.png"
