name: ph_tower
description: "The Tower — Princeton High School's student newspaper."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  flutter_markdown_plus: ^1.0.7
  url_launcher: ^6.3.2
  webview_flutter: ^4.14.0
  share_plus: ^10.1.0
  shared_preferences: ^2.3.0
  onesignal_flutter: ^5.3.0
  pdfx: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/home_layout.txt
